query GetTodos {
  todos {
    id
    title
    description
    completed
    createdAt
    updatedAt
  }
}

query GetTodo($id: ID!) {
  todo(id: $id) {
    id
    title
    description
    completed
    createdAt
    updatedAt
  }
}

mutation CreateTodo($title: String!, $description: String) {
  createTodo(title: $title, description: $description) {
    id
    title
    description
    completed
    createdAt
    updatedAt
  }
}

mutation UpdateTodo(
  $id: ID!
  $title: String
  $description: String
  $completed: Boolean
) {
  updateTodo(
    id: $id
    title: $title
    description: $description
    completed: $completed
  ) {
    id
    title
    description
    completed
    createdAt
    updatedAt
  }
}

mutation DeleteTodo($id: ID!) {
  deleteTodo(id: $id)
}
